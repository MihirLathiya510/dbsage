pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "**/*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    ruff-check:
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    mypy:
      glob: "src/**/*.py"
      run: uv run mypy src/
    bandit:
      glob: "src/**/*.py"
      run: uv run bandit -r src/ -q

commit-msg:
  commands:
    commitlint:
      run: |
        msg=$(cat {1})
        echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\(.+\))?!?: .+' || {
          echo ""
          echo "  Invalid commit message: $msg"
          echo ""
          echo "  Must follow Conventional Commits:"
          echo "    type(scope): description"
          echo ""
          echo "  Types: feat fix docs style refactor test chore build ci perf revert"
          echo "  Example: feat(tools): add mssql connection support"
          echo ""
          exit 1
        }

pre-push:
  parallel: true
  commands:
    ruff-format:
      run: uv run ruff format --check src/ tests/
    mypy:
      run: uv run mypy src/
    bandit:
      run: uv run bandit -r src/ -q
    tests:
      run: uv run pytest --no-cov -q
