name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint — ruff check
        run: uv run ruff check src/ tests/

      - name: Lint — ruff format
        run: uv run ruff format --check src/ tests/

      - name: Type check — mypy
        run: uv run mypy src/

      - name: Security scan — bandit
        run: uv run bandit -r src/ -q

      - name: Tests + coverage
        run: uv run pytest --no-header -q
        env:
          # Provide dummy env vars so Settings can load without a real DB
          DBSAGE_DB_HOST: localhost
          DBSAGE_DB_PORT: "3306"
          DBSAGE_DB_NAME: testdb
          DBSAGE_DB_USER: testuser
          DBSAGE_DB_PASSWORD: testpass
          DBSAGE_DB_TYPE: mysql
